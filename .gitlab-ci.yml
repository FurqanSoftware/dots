stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:latest
  only:
    - tags
  before_script:
    - apk add --no-cache curl
    - curl -L https://fly.io/install.sh | sh
    - export PATH="$HOME/.fly/bin:$PATH"
  script:
    - echo "FLY_API_TOKEN length:${#FLY_API_TOKEN}"
    - fly deploy --build-arg MAXMIND_LICENSE_KEY=$MAXMIND_LICENSE_KEY
  variables:
    FLY_API_TOKEN: $FLY_API_TOKEN
