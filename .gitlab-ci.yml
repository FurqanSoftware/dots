stages:
  - deploy

deploy production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://dots.fsapp.co/
  only:
    - tags
  before_script:
    - apk add --no-cache curl
    - curl -L https://fly.io/install.sh | sh
    - export PATH="$HOME/.fly/bin:$PATH"
  script:
    - fly deploy --build-arg MAXMIND_LICENSE_KEY=$MAXMIND_LICENSE_KEY
